# =============================================================================
# SpaceGuard - Production Docker Compose
# All services: API, Web, PostgreSQL, Redis, Nginx (reverse proxy + SSL)
# =============================================================================
#
# Usage:
#   cp .env.production.example .env.production
#   # Edit .env.production with real values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# First-time SSL setup:
#   ./scripts/deploy.sh setup-ssl
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with TimescaleDB
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: spaceguard-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spaceguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-spaceguard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spaceguard-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaceguard}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports exposed externally - only accessible within the Docker network

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: spaceguard-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - spaceguard-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed externally

  # ---------------------------------------------------------------------------
  # API (Hono backend)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: spaceguard-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-spaceguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spaceguard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spaceguard-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # No ports exposed externally - nginx handles all inbound traffic

  # ---------------------------------------------------------------------------
  # Web (Next.js frontend)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://spaceguard.example.com}
    container_name: spaceguard-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - spaceguard-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # No ports exposed externally

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy (SSL termination)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: spaceguard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - spaceguard-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Certbot (SSL certificate renewal)
  # Runs once then exits; deploy.sh schedules periodic renewal via cron
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: spaceguard-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - spaceguard-internal
    profiles:
      - ssl

networks:
  spaceguard-internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
