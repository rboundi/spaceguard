services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: spaceguard-db
    environment:
      POSTGRES_USER: spaceguard
      POSTGRES_PASSWORD: spaceguard_dev
      POSTGRES_DB: spaceguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spaceguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spaceguard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
